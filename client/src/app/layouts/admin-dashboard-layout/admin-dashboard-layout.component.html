<!-- Admin Dashboard Layout -->
<div class="min-h-screen bg-snow flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-neutral-200 shadow-lg flex flex-col fixed h-full z-50">
    <!-- Logo/Brand -->
    <div class="p-6 border-b border-neutral-200">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-nordic-blue to-finnish-lake rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-bold text-nordic-blue">Pharmic</h1>
          <p class="text-xs text-neutral-600">Admin Panel</p>
        </div>
      </div>
    </div>

    <!-- Navigation Links -->
    <nav class="flex-1 p-4 space-y-1">
      <a 
        [href]="link.link" 
        *ngFor="let link of sidebarData.navigationLinks" 
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-neutral-700 hover:bg-finnish-ice hover:text-nordic-blue transition-all duration-200 group"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getIconPath(link.label)"></path>
        </svg>
        <span class="font-medium">{{ link.label }}</span>
      </a>
    </nav>

    <!-- User Profile Section -->
    <div class="p-4 border-t border-neutral-200">
      <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-finnish-ice">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-nordic-blue to-finnish-lake flex items-center justify-center text-white font-semibold">
          {{ sidebarData.userProfile.username.charAt(0) }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-finnish-midnight truncate">{{ sidebarData.userProfile.username }}</p>
          <p class="text-xs text-neutral-600">Administrator</p>
        </div>
      </div>
      <a href="/" class="mt-3 flex items-center gap-2 px-3 py-2 text-sm text-neutral-600 hover:text-nordic-blue transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
        Back to Website
      </a>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 ml-64">
    <!-- Top Header Bar -->
    <header class="bg-white border-b border-neutral-200 sticky top-0 z-40 shadow-sm">
      <div class="px-6 py-4">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-2xl font-bold text-finnish-midnight">Admin Dashboard</h2>
            <p class="text-sm text-neutral-600">Manage your pharmacy operations</p>
          </div>
          <div class="flex items-center gap-4">
            <!-- Notifications -->
            <button class="relative p-2 text-neutral-600 hover:text-nordic-blue transition-colors rounded-lg hover:bg-finnish-ice">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
              </svg>
              <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
