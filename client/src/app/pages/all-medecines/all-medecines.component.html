<div class="min-h-screen bg-nordic-snow">
  
  <!-- Hero Section -->
  <div class="relative bg-gradient-to-br from-nordic-blue to-finnish-midnight text-white py-20">
    <div class="absolute inset-0 opacity-10" style="background-image: url('assets/images/products.jpg'); background-size: cover; background-position: center;"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center space-y-6">
        <h1 class="text-5xl md:text-6xl font-bold text-white">All Medicines</h1>
        <p class="text-xl text-white/90 max-w-2xl mx-auto">Browse our complete collection of quality healthcare products</p>
      </div>
    </div>
  </div>

  <!-- Filters Section -->
  <div class="bg-white shadow-sm border-b border-neutral-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
        
        <!-- Category Filter -->
        <div class="w-full md:w-auto">
          <div class="relative">
            <select 
              [(ngModel)]="selectedCategory" 
              (change)="onCategoryChange($event)" 
              class="w-full md:w-64 px-4 py-3 pl-10 border-2 border-neutral-200 rounded-xl focus:border-nordic-blue focus:outline-none transition-all duration-200 appearance-none bg-white cursor-pointer">
              <option value="">All Categories</option>
              <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
            </select>
            <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-neutral-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
            <svg class="absolute right-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-neutral-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="w-full md:flex-1 md:max-w-2xl">
          <div class="relative">
            <input 
              #searchInput 
              (input)="onSearchTermChange(searchInput.value)"
              type="text"
              placeholder="Search for medicines by name..."
              class="w-full px-4 py-3 pl-12 border-2 border-neutral-200 rounded-xl focus:border-nordic-blue focus:outline-none transition-all duration-200"
            />
            <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
        </div>

        <!-- Results Count -->
        <div class="text-neutral-600 text-sm font-medium whitespace-nowrap">
          {{ filteredMedecines?.length || 0 }} products
        </div>
      </div>
    </div>
  </div>

  <!-- Products Grid -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <!-- Empty State -->
    <div *ngIf="filteredMedecines?.length === 0" class="text-center py-20">
      <svg class="w-24 h-24 mx-auto text-neutral-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <h3 class="text-2xl font-semibold text-neutral-700 mb-2">No medicines found</h3>
      <p class="text-neutral-500">Try adjusting your search or filter criteria</p>
    </div>

    <!-- Products Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div *ngFor="let medecine of filteredMedecines" 
           class="group bg-white rounded-2xl border-2 border-neutral-200 hover:border-nordic-blue p-6 transition-all duration-300 hover:shadow-xl">
        
        <!-- Image Container -->
        <div class="relative mb-4 overflow-hidden rounded-xl bg-nordic-sky/30">
          <img [src]="medecine.imageUrl" 
               alt="{{medecine.name}}" 
               class="w-full h-48 object-cover group-hover:scale-110 transition-transform duration-500">
          <!-- Stock Badge -->
          <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full">
            <span class="text-xs font-semibold text-nordic-blue">In Stock</span>
          </div>
        </div>

        <!-- Content -->
        <div class="space-y-3">
          <div>
            <h3 class="text-lg font-semibold text-neutral-900 group-hover:text-nordic-blue transition-colors duration-200 line-clamp-2">
              {{ medecine.name }}
            </h3>
            <p class="text-sm text-neutral-500 mt-1">{{ medecine.category }}</p>
          </div>

          <!-- Price & Action -->
          <div class="flex items-center justify-between pt-3 border-t border-neutral-100">
            <div class="flex flex-col">
              <span class="text-2xl font-bold text-nordic-blue">${{ medecine.amount }}</span>
            </div>
            <a [routerLink]="['/medecine', medecine._id]" 
               class="inline-flex items-center justify-center bg-nordic-blue hover:bg-finnish-midnight text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 hover:scale-105">
              View
              <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
