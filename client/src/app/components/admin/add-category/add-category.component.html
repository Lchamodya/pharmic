<!-- Add Category Modal -->
<div class="p-6 min-w-[400px] max-w-lg">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-6 pb-4 border-b border-neutral-200">
    <div class="w-10 h-10 bg-gradient-to-br from-nordic-blue to-finnish-lake rounded-lg flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
    </div>
    <div>
      <h2 class="text-xl font-bold text-finnish-midnight">Add New Category</h2>
      <p class="text-sm text-neutral-600">Create a new medicine category</p>
    </div>
  </div>

  <!-- Form -->
  <form [formGroup]="categoryForm" (ngSubmit)="createCategory()" class="space-y-4">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Category Name</mat-label>
      <input matInput type="text" formControlName="name">
      <mat-error *ngIf="categoryForm.controls['name'].invalid && categoryForm.controls['name'].touched">
        Category name is required.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Category Description</mat-label>
      <textarea matInput formControlName="description" rows="4"></textarea>
      <mat-error *ngIf="categoryForm.controls['description'].invalid && categoryForm.controls['description'].touched">
        Description is required.
      </mat-error>
    </mat-form-field>

    <!-- Action Buttons -->
    <div class="flex gap-3 pt-2">
      <button type="submit" class="btn-primary flex-1" [disabled]="categoryForm.invalid">
        <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Add Category
      </button>
      <button type="button" mat-dialog-close class="btn-secondary flex-1">Cancel</button>
    </div>
  </form>
</div>
