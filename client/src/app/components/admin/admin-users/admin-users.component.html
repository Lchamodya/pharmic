<!-- Users Management -->
<div class="space-y-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h2 class="text-2xl font-bold text-finnish-midnight">Users</h2>
      <p class="text-neutral-600 text-sm mt-1">Manage registered users</p>
    </div>
    <button 
      type="button" 
      class="btn-primary flex items-center gap-2"
      (click)="openAddUserModal()"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
      Add User
    </button>
  </div>

  <!-- Users Table -->
  <div class="bg-white rounded-xl shadow-sm border border-neutral-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-finnish-ice border-b border-neutral-200">
          <tr>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">#</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Name</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Role</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Email</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Mobile</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Address</th>
            <th scope="col" class="px-6 py-4 text-right text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-neutral-100">
          <tr class="hover:bg-finnish-ice/30 transition-colors" *ngFor="let user of users; let i = index">
            <td class="px-6 py-4 text-sm text-neutral-600">{{ i + 1 }}</td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-nordic-blue to-finnish-lake flex items-center justify-center text-white font-semibold">
                  {{ user.name.charAt(0).toUpperCase() }}
                </div>
                <span class="font-medium text-finnish-midnight">{{ user.name }}</span>
              </div>
            </td>
            <td class="px-6 py-4">
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                    [class.bg-purple-100]="user.role === 'admin'"
                    [class.text-purple-800]="user.role === 'admin'"
                    [class.bg-blue-100]="user.role !== 'admin'"
                    [class.text-blue-800]="user.role !== 'admin'">
                {{ user.role }}
              </span>
            </td>
            <td class="px-6 py-4 text-sm text-neutral-600">{{ user.email }}</td>
            <td class="px-6 py-4 text-sm text-neutral-600">{{ user.mobile }}</td>
            <td class="px-6 py-4 text-sm text-neutral-600 max-w-xs truncate">{{ user.address }}</td>
            <td class="px-6 py-4">
              <div class="flex items-center justify-end gap-2">
                <button 
                  class="px-3 py-1.5 text-sm font-medium text-nordic-blue hover:bg-finnish-ice rounded-lg transition-colors flex items-center gap-1"
                  (click)="openEditUserModal(user)"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                  </svg>
                  Edit
                </button>
                <button 
                  class="px-3 py-1.5 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-1"
                  (click)="deleteUser(user._id, user.name)"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                  </svg>
                  Delete
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <!-- Empty State -->
    <div *ngIf="users.length === 0" class="p-12 text-center">
      <div class="w-16 h-16 mx-auto mb-4 bg-finnish-ice rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
        </svg>
      </div>
      <h3 class="text-lg font-medium text-finnish-midnight mb-2">No users yet</h3>
      <p class="text-neutral-600 mb-4">Get started by adding your first user</p>
      <button class="btn-primary" (click)="openAddUserModal()">Add User</button>
    </div>
  </div>
</div>
