<!-- Edit Category Modal -->
<div class="p-6 min-w-[400px] max-w-lg">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-6 pb-4 border-b border-neutral-200">
    <div class="w-10 h-10 bg-gradient-to-br from-nordic-blue to-finnish-lake rounded-lg flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
      </svg>
    </div>
    <div>
      <h2 class="text-xl font-bold text-finnish-midnight">Edit Category</h2>
      <p class="text-sm text-neutral-600">Update category details</p>
    </div>
  </div>

  <!-- Form -->
  <form [formGroup]="categoryForm" (ngSubmit)="updateCategory()" class="space-y-4">
    <input type="hidden" formControlName="_id">

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Category Name</mat-label>
      <input matInput type="text" formControlName="name">
      <mat-error *ngIf="categoryForm.controls['name'].invalid && categoryForm.controls['name'].touched">
        Category name is required.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Category Description</mat-label>
      <textarea matInput formControlName="description" rows="4"></textarea>
      <mat-error *ngIf="categoryForm.controls['description'].invalid && categoryForm.controls['description'].touched">
        Description is required.
      </mat-error>
    </mat-form-field>

    <!-- Action Buttons -->
    <div class="flex gap-3 pt-2">
      <button type="submit" class="btn-primary flex-1">
        <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        Update Category
      </button>
      <button type="button" mat-dialog-close class="btn-secondary flex-1">Cancel</button>
    </div>
  </form>
</div>
