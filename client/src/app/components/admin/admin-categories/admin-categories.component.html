<!-- Categories Management -->
<div class="space-y-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h2 class="text-2xl font-bold text-finnish-midnight">Categories</h2>
      <p class="text-neutral-600 text-sm mt-1">Manage your medicine categories</p>
    </div>
    <button 
      type="button" 
      class="btn-primary flex items-center gap-2"
      (click)="openAddCategoryModal()"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
      Add Category
    </button>
  </div>

  <!-- Categories Table -->
  <div class="bg-white rounded-xl shadow-sm border border-neutral-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-finnish-ice border-b border-neutral-200">
          <tr>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">#</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Category</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Description</th>
            <th scope="col" class="px-6 py-4 text-right text-xs font-semibold text-finnish-midnight uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-neutral-100">
          <tr class="hover:bg-finnish-ice/30 transition-colors" *ngFor="let category of categories; let i = index">
            <td class="px-6 py-4 text-sm text-neutral-600">{{ i + 1 }}</td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-nordic-blue to-finnish-lake rounded-lg flex items-center justify-center flex-shrink-0">
                  <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                  </svg>
                </div>
                <span class="font-medium text-finnish-midnight">{{ category.name }}</span>
              </div>
            </td>
            <td class="px-6 py-4 text-sm text-neutral-600">{{ category.description }}</td>
            <td class="px-6 py-4">
              <div class="flex items-center justify-end gap-2">
                <button 
                  class="px-3 py-1.5 text-sm font-medium text-nordic-blue hover:bg-finnish-ice rounded-lg transition-colors flex items-center gap-1"
                  (click)="openEditCategoryModal(category)"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                  </svg>
                  Edit
                </button>
                <button 
                  class="px-3 py-1.5 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-1"
                  (click)="openDeleteConfirmationModal(category._id)"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                  </svg>
                  Delete
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <!-- Empty State -->
    <div *ngIf="categories.length === 0" class="p-12 text-center">
      <div class="w-16 h-16 mx-auto mb-4 bg-finnish-ice rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
        </svg>
      </div>
      <h3 class="text-lg font-medium text-finnish-midnight mb-2">No categories yet</h3>
      <p class="text-neutral-600 mb-4">Get started by adding your first category</p>
      <button class="btn-primary" (click)="openAddCategoryModal()">Add Category</button>
    </div>
  </div>
</div>
