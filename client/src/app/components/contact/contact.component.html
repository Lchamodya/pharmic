<section id="contact" class="py-20 bg-gradient-to-br from-nordic-sky/30 to-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <!-- Section Header -->
    <div class="text-center mb-16 space-y-4">
      <div class="inline-block">
        <span class="bg-nordic-blue/10 text-nordic-blue px-4 py-2 rounded-full text-sm font-semibold uppercase tracking-wider">
          Get in Touch
        </span>
      </div>
      <h2 class="text-4xl md:text-5xl font-bold text-neutral-900">
        Contact Us
      </h2>
      <p class="text-lg text-neutral-600 max-w-2xl mx-auto">
        Have questions? We're here to help. Send us a message and we'll respond as soon as possible.
      </p>
    </div>

    <div class="grid lg:grid-cols-2 gap-12 items-center">
      
      <!-- Image Section -->
      <div class="hidden lg:block">
        <div class="relative">
          <!-- Decorative elements -->
          <div class="absolute -top-8 -left-8 w-64 h-64 bg-nordic-blue/10 rounded-full blur-3xl"></div>
          <div class="absolute -bottom-8 -right-8 w-72 h-72 bg-finnish-lake/10 rounded-full blur-3xl"></div>
          
          <img [src]="imagePath" 
               alt="Contact Us" 
               class="relative z-10 rounded-2xl shadow-2xl w-full object-cover">
        </div>
      </div>

      <!-- Form Section -->
      <div class="bg-white rounded-2xl p-8 lg:p-12 shadow-lg border border-neutral-200">
        <form [formGroup]="contactForm" class="space-y-6">
          
          <!-- Name Field -->
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-neutral-700">Full Name</label>
            <input 
              type="text"
              formControlName="name"
              placeholder="Enter your name"
              class="w-full px-4 py-3 border-2 border-neutral-200 rounded-xl focus:border-nordic-blue focus:outline-none transition-all duration-200"
            />
            <p *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched" 
               class="text-sm text-red-500 mt-1">
              Name is required
            </p>
          </div>

          <!-- Email Field -->
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-neutral-700">Email Address</label>
            <input 
              type="email"
              formControlName="email"
              placeholder="your.email@example.com"
              class="w-full px-4 py-3 border-2 border-neutral-200 rounded-xl focus:border-nordic-blue focus:outline-none transition-all duration-200"
            />
            <p *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched" 
               class="text-sm text-red-500 mt-1">
              Please enter a valid email address
            </p>
          </div>

          <!-- Message Field -->
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-neutral-700">Message</label>
            <textarea 
              formControlName="message"
              placeholder="Tell us how we can help you..."
              rows="6"
              class="w-full px-4 py-3 border-2 border-neutral-200 rounded-xl focus:border-nordic-blue focus:outline-none transition-all duration-200 resize-none"
            ></textarea>
            <p *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched" 
               class="text-sm text-red-500 mt-1">
              Message is required
            </p>
          </div>

          <!-- Submit Button -->
          <button 
            type="submit"
            class="w-full bg-nordic-blue hover:bg-finnish-midnight text-white px-8 py-4 rounded-xl font-semibold text-lg transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105 flex items-center justify-center">
            Send Message
            <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
            </svg>
          </button>
        </form>

        <!-- Contact Info -->
        <div class="mt-8 pt-8 border-t border-neutral-200 space-y-4">
          <p class="text-sm font-semibold text-neutral-700 uppercase tracking-wider">Quick Contact</p>
          <div class="space-y-3 text-neutral-600">
            <a href="tel:+94712627890" class="flex items-center space-x-3 hover:text-nordic-blue transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
              </svg>
              <span>(+94) 71 262 7890</span>
            </a>
            <a href="mailto:chamodya@gmail.com" class="flex items-center space-x-3 hover:text-nordic-blue transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
              </svg>
              <span>chamodya@gmail.com</span>
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
