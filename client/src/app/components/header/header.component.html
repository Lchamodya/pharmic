<header class="bg-white shadow-sm sticky top-0 z-50 border-b border-neutral-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between py-4">
      
      <!-- Logo -->
      <div class="flex items-center">
        <a href="/" class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-gradient-to-br from-nordic-blue to-finnish-lake rounded-xl flex items-center justify-center">
            <span class="text-white font-bold text-xl">P</span>
          </div>
          <span class="text-2xl font-bold text-nordic-blue hidden sm:block">Pharmic</span>
        </a>
      </div>

      <!-- Main Navigation - Desktop -->
      <nav class="hidden lg:flex items-center space-x-8">
        <a *ngFor="let link of navigationLinks" 
           [href]="link.link" 
           class="text-neutral-700 hover:text-nordic-blue font-medium transition-colors duration-200 text-sm uppercase tracking-wide">
          {{ link.label }}
        </a>
      </nav>

      <!-- Right Section -->
      <div class="flex items-center space-x-4">
        
        <!-- Search Icon - Mobile -->
        <button class="lg:hidden text-neutral-700 hover:text-nordic-blue">
          <fa-icon [icon]="searchIcon" size="lg"></fa-icon>
        </button>

        <!-- Cart -->
        <a href="cart" class="relative text-neutral-700 hover:text-nordic-blue transition-colors duration-200">
          <fa-icon [icon]="cartIcon" size="lg"></fa-icon>
          <span *ngIf="cartItemCount > 0" class="absolute -top-2 -right-2 bg-nordic-blue text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-semibold">{{ cartItemCount }}</span>
        </a>

        <!-- User Section -->
        <div *ngIf="user; else loginSection" class="flex items-center space-x-3">
          <a href="/user" class="text-sm font-medium text-neutral-700 hover:text-nordic-blue hidden md:block">
            {{ user?.name }}
          </a>
          <button mat-button type="button" 
                  class="bg-nordic-blue hover:bg-finnish-midnight text-white px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200" 
                  (click)="logout()">
            Logout
          </button>
        </div>
        
        <ng-template #loginSection>
          <a href="/login" 
             class="bg-nordic-blue hover:bg-finnish-midnight text-white px-6 py-2 rounded-lg text-sm font-medium transition-all duration-200">
            Login
          </a>
        </ng-template>
      </div>
    </div>

    <!-- Search Bar - Desktop -->
    <div class="hidden lg:block pb-4">
      <form [formGroup]="searchForm" (ngSubmit)="onSubmit()" class="max-w-2xl mx-auto">
        <div class="relative">
          <input 
            type="text" 
            formControlName="searchValue" 
            placeholder="Search for medicines..." 
            class="w-full px-6 py-3 pl-12 border-2 border-neutral-200 rounded-xl focus:border-nordic-blue focus:outline-none transition-all duration-200"
          />
          <fa-icon [icon]="searchIcon" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-neutral-400"></fa-icon>
          <button type="submit" 
                  class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-nordic-blue hover:bg-finnish-midnight text-white px-6 py-2 rounded-lg font-medium transition-all duration-200">
            Search
          </button>
        </div>
      </form>
    </div>
  </div>
</header>
