<section class="py-20 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <!-- Section Header - Finnish minimalism -->
    <div class="text-center mb-16 space-y-4">
      <div class="inline-block">
        <span class="bg-nordic-blue/10 text-nordic-blue px-4 py-2 rounded-full text-sm font-semibold uppercase tracking-wider">
          Our Collection
        </span>
      </div>
      <h2 class="text-4xl md:text-5xl font-bold text-neutral-900">
        Featured Medicines
      </h2>
      <p class="text-lg text-neutral-600 max-w-2xl mx-auto">
        Discover our carefully selected range of quality medicines and healthcare products
      </p>
    </div>

    <!-- Products Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 lg:gap-8">
      <div *ngFor="let medecine of medecines" 
           class="group bg-white rounded-2xl border-2 border-neutral-200 hover:border-nordic-blue p-6 transition-all duration-300 hover:shadow-xl">
        
        <!-- Image Container -->
        <div class="relative mb-4 overflow-hidden rounded-xl bg-nordic-sky/30">
          <img [src]="medecine.imageUrl" 
               alt="{{medecine.name}}" 
               class="w-full h-48 object-cover group-hover:scale-110 transition-transform duration-500">
          <!-- Badge -->
          <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full">
            <span class="text-xs font-semibold text-nordic-blue">In Stock</span>
          </div>
        </div>

        <!-- Content -->
        <div class="space-y-3">
          <div>
            <h3 class="text-lg font-semibold text-neutral-900 group-hover:text-nordic-blue transition-colors duration-200 line-clamp-2">
              {{ medecine.name }}
            </h3>
            <p class="text-sm text-neutral-500 mt-1">{{ medecine.category }}</p>
          </div>

          <!-- Price & Action -->
          <div class="flex items-center justify-between pt-3 border-t border-neutral-100">
            <div class="flex flex-col">
              <span class="text-2xl font-bold text-nordic-blue">${{ medecine.amount }}</span>
            </div>
            <a [routerLink]="['/medecine', medecine._id]" 
               class="inline-flex items-center justify-center bg-nordic-blue hover:bg-finnish-midnight text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 hover:scale-105">
              View
              <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- View All Button - Finnish style -->
    <div class="text-center mt-16">
      <a href="/medecines" 
         class="inline-flex items-center justify-center bg-white hover:bg-nordic-sky text-nordic-blue border-2 border-nordic-blue px-10 py-4 rounded-xl font-semibold text-lg transition-all duration-300 hover:scale-105">
        View All Medicines
        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
        </svg>
      </a>
    </div>

  </div>
</section>
